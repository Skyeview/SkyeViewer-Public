name: building my windows
on:
  push:
  pull_request:
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64
    - name: Build
      run: cmake --build build --config Release -- /m
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: skyeview-exe
        path: |
          build/Release/skyeview.exe
          build/Release/skyeview-mal.exe
    - name: Create Release
      id: create_release
      if: github.ref == 'refs/heads/main'
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release ${{ github.run_number }}
        body: Automated release from GitHub Actions (build ${{ github.run_number }})
        draft: false
        prerelease: false
    - name: Upload Release Asset (skyeview)
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build/Release/skyeview.exe
        asset_name: skyeview.exe
        asset_content_type: application/octet-stream
    - name: Upload Release Asset (main1)
      if: github.ref == 'refs/heads/main'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: build/Release/skyeview-mal.exe
        asset_name: main1.exe
        asset_content_type: application/octet-stream
